name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, fresh-main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - name: Verify Cloudflare token
        run: |
          curl -s -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify > status.txt
          echo "HTTP status: $(cat status.txt)"
          cat response.json

      - run: npx wrangler pages deploy . --project-name=inflictor --commit-dirty=true --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_OPTIONS: --use-system-ca
